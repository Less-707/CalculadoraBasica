<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Básica</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            color: #111;
        }
        h2 {
            font-weight: normal;
            font-size: 26px;
            margin-bottom: 30px;
        }
        .grupo-input {
            margin-bottom: 25px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-size: 15px;
        }
        input[type="number"] {
            width: 260px;
            padding: 10px;
            box-sizing: border-box;
            border: 1px solid #999;
            border-radius: 3px;
            font-size: 14px;
        }
        input[type="number"]::placeholder {
            color: #b0b0b0;
        }
        .resultado-texto {
            margin: 35px 0;
            font-size: 15px;
        }
        .botones {
            display: flex;
            gap: 15px; /* Espacio uniforme entre los botones */
        }
        .botones button {
            padding: 10px 0;
            width: 130px; /* Todos los botones del mismo ancho */
            cursor: pointer;
            border: 1px solid #777;
            border-radius: 4px;
            background-color: #ededed;
            font-size: 14px;
        }
        .botones button:hover {
            background-color: #dcdcdc;
        }
    </style>
</head>
<body>

<h2>Calculadora Basica</h2>

<div class="grupo-input">
    <label for="num1">Numero 1:</label>
    <input type="number" id="num1" placeholder="Placeholder">
</div>

<div class="grupo-input">
    <label for="num2">Numero 2:</label>
    <input type="number" id="num2" placeholder="Placeholder">
</div>

<div class="resultado-texto">
    Resultado: <span id="resultado">0</span>
</div>

<div class="botones">
    <button onclick="calcular('suma')">Suma</button>
    <button onclick="calcular('resta')">Resta</button>
    <button onclick="calcular('multiplicacion')">Multiplicacion</button>
    <button onclick="calcular('division')">Division</button>
</div>

<script>
    function calcular(operacion) {
        const num1 = parseFloat(document.getElementById('num1').value) || 0;
        const num2 = parseFloat(document.getElementById('num2').value) || 0;
        let resultado = 0;

        switch(operacion) {
            case 'suma':
                resultado = num1 + num2;
                break;
            case 'resta':
                resultado = num1 - num2;
                break;
            case 'multiplicacion':
                resultado = num1 * num2;
                break;
            case 'division':
                if(num2 === 0) {
                    alert("No es posible dividir por cero.");
                    return;
                }
                resultado = num1 / num2;
                break;
        }

        document.getElementById('resultado').innerText = resultado;
    }
</script>

</body>
</html>
